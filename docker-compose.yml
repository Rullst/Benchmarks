version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bench
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  actix:
    build:
      context: ./actix
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/bench
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3000"

  aspnet-core:
    build:
      context: ./aspnet-core
      dockerfile: Dockerfile
